<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Workout Logger</title><script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{color-scheme:dark;--bg:var(--tg-theme-bg-color,#0b0f14);--card:var(--tg-theme-secondary-bg-color,#141a22);--text:var(--tg-theme-text-color,#f7f9fc);--muted:var(--tg-theme-hint-color,#8d98a8);--accent:var(--tg-theme-button-color,#2f80ed);--accentText:var(--tg-theme-button-text-color,#fff);--line:rgba(255,255,255,.08);--danger:#ff5f6d;--ok:#42d392}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:radial-gradient(circle at top right,rgba(47,128,237,.14),transparent 38%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,sans-serif;min-height:100vh}.wrap{max-width:620px;margin:auto;padding:16px 14px 28px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.badge{font-size:12px;font-weight:800;padding:7px 10px;border:1px solid var(--line);border-radius:999px;color:var(--muted);background:rgba(255,255,255,.03)}.card{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.015)),var(--card);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 18px 55px rgba(0,0,0,.28)}.exercise{font-weight:900;font-size:22px;line-height:1.45;margin:5px 0 2px}.set{display:inline-flex;margin-top:8px;padding:7px 11px;border-radius:12px;background:rgba(47,128,237,.13);font-size:13px;font-weight:800}.info{white-space:pre-line;background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:16px;padding:13px;margin:15px 0;font-size:13px;line-height:1.75;color:var(--muted)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:15px}.field label{display:block;font-size:12px;font-weight:800;color:var(--muted);margin:0 4px 7px}.input-wrap{position:relative}.field input{width:100%;height:66px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.045);color:inherit;font-size:26px;font-weight:900;text-align:center;outline:none;padding:8px 42px 8px 8px;transition:.2s}.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(47,128,237,.12)}.unit{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--muted);font-weight:800}.primary{width:100%;height:58px;border:0;border-radius:18px;background:linear-gradient(135deg,var(--accent),#5d9cff);color:var(--accentText);font-size:17px;font-weight:900;margin-top:13px;box-shadow:0 10px 24px rgba(47,128,237,.22)}button:active{transform:scale(.985)}button:disabled{opacity:.5}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.secondary,.dangerBtn{height:48px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.025);color:inherit;font-weight:800}.dangerBtn{color:#ff8b95}.status{min-height:24px;text-align:center;margin-top:12px;font-size:13px;font-weight:800}.success{color:var(--ok)}.error{color:#ff8b95}.history{margin-top:18px}.section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}.section-title h3{font-size:14px;margin:0}.count{font-size:11px;color:var(--muted)}.rows{display:grid;gap:8px}.row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 12px;border:1px solid var(--line);background:rgba(255,255,255,.025);border-radius:14px}.row-main{display:flex;align-items:center;gap:10px}.setno{width:32px;height:32px;display:grid;place-items:center;border-radius:10px;background:rgba(47,128,237,.12);font-size:12px;font-weight:900}.metric{font-size:14px;font-weight:900}.edit{border:1px solid var(--line);background:rgba(255,255,255,.04);color:inherit;border-radius:11px;height:34px;padding:0 11px;font-weight:800}.pr{white-space:pre-line;margin-top:10px;font-weight:800;color:#ffd166}.loading{display:grid;place-items:center;min-height:70vh;color:var(--muted)}.hidden{display:none!important}.modal{position:fixed;inset:0;background:rgba(0,0,0,.62);display:grid;place-items:end center;padding:14px;z-index:20}.sheet{width:min(100%,620px);background:var(--card);border:1px solid var(--line);border-radius:24px 24px 18px 18px;padding:18px;box-shadow:0 -20px 60px rgba(0,0,0,.4)}.sheet h3{margin:0 0 4px;font-size:18px}.sheet p{margin:0 0 14px;color:var(--muted);font-size:13px}.sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.cancel{height:50px;border:1px solid var(--line);background:transparent;color:inherit;border-radius:16px;font-weight:800}.saveEdit{height:50px;border:0;background:var(--accent);color:var(--accentText);border-radius:16px;font-weight:900}
</style></head><body>
<div id="loading" class="loading">جاري تجهيز التمرين…</div>
<div id="app" class="wrap hidden"><div class="top"><span class="badge">FITBIT AIR • WORKOUT</span><span id="day" class="badge"></span></div><div class="card"><div id="exercise" class="exercise"></div><div id="set" class="set"></div><div id="last" class="info hidden"></div><div class="grid"><div class="field"><label for="weight">الوزن</label><div class="input-wrap"><input id="weight" type="number" inputmode="decimal" min="0" max="1000" step="0.5" placeholder="20"><span class="unit">كجم</span></div></div><div class="field"><label for="reps">العدات</label><div class="input-wrap"><input id="reps" type="number" inputmode="numeric" min="1" max="999" step="1" placeholder="12"><span class="unit">عدة</span></div></div></div><button id="save" class="primary">حفظ الجولة</button><div class="actions"><button id="undo" class="dangerBtn">حذف آخر جولة</button><button id="finish" class="secondary">إنهاء التمرين</button></div><div id="status" class="status"></div><div id="pr" class="pr"></div><div id="history" class="history hidden"><div class="section-title"><h3>جولات اليوم</h3><span id="count" class="count"></span></div><div id="rows" class="rows"></div></div></div></div>
<div id="modal" class="modal hidden"><div class="sheet"><h3>تعديل الجولة</h3><p id="editLabel"></p><div class="grid"><div class="field"><label>الوزن</label><div class="input-wrap"><input id="editWeight" type="number" inputmode="decimal" step="0.5"><span class="unit">كجم</span></div></div><div class="field"><label>العدات</label><div class="input-wrap"><input id="editReps" type="number" inputmode="numeric" step="1"><span class="unit">عدة</span></div></div></div><div class="sheet-actions"><button id="cancelEdit" class="cancel">إلغاء</button><button id="saveEdit" class="saveEdit">حفظ التعديل</button></div></div></div>
<script>
const tg=window.Telegram?.WebApp;if(tg){tg.ready();tg.expand();tg.setHeaderColor?.('secondary_bg_color');}
const qs=new URLSearchParams(location.search),day=qs.get('day'),idx=qs.get('idx'),initData=tg?.initData||'';const $=id=>document.getElementById(id);let editingSet=null;
function api(path,body){return fetch(path,{method:body?'POST':'GET',headers:{'Content-Type':'application/json','X-Telegram-Init-Data':initData},body:body?JSON.stringify(body):undefined}).then(async r=>{const j=await r.json().catch(()=>({error:'رد غير صالح'}));if(!r.ok)throw new Error(j.error||'حدث خطأ');return j;});}
function renderRows(sets){const box=$('rows');box.innerHTML='';(sets||[]).forEach(s=>{const d=document.createElement('div');d.className='row';d.innerHTML=`<div class="row-main"><div class="setno">${s.set_number}</div><div class="metric">${s.weight} كجم × ${s.reps}</div></div><button class="edit" data-set="${s.set_number}" data-weight="${s.weight}" data-reps="${s.reps}">تعديل</button>`;box.appendChild(d)});box.querySelectorAll('.edit').forEach(b=>b.onclick=()=>openEdit(b));$('count').textContent=`${(sets||[]).length} جولة`;$('history').classList.toggle('hidden',!(sets||[]).length)}
function setStatus(text,type=''){const el=$('status');el.textContent=text;el.className='status '+type}
function openEdit(btn){editingSet=parseInt(btn.dataset.set,10);$('editWeight').value=btn.dataset.weight;$('editReps').value=btn.dataset.reps;$('editLabel').textContent=`الجولة ${editingSet}`;$('modal').classList.remove('hidden');setTimeout(()=>$('editWeight').focus(),120)}
function closeEdit(){$('modal').classList.add('hidden');editingSet=null}
async function load(){try{const c=await api(`/api/workout/context?day=${encodeURIComponent(day||'')}&idx=${encodeURIComponent(idx||'')}`);$('day').textContent=c.day_label;$('exercise').textContent=c.exercise;$('set').textContent=`الجولة ${c.next_set}`;if(c.info){$('last').textContent=c.info;$('last').classList.remove('hidden')}renderRows(c.today_sets);$('loading').classList.add('hidden');$('app').classList.remove('hidden');setTimeout(()=>$('weight').focus(),120)}catch(e){$('loading').textContent='⚠️ '+e.message}}
$('save').onclick=async()=>{const weight=parseFloat($('weight').value),reps=parseInt($('reps').value,10);if(!Number.isFinite(weight)||weight<0)return setStatus('اكتب الوزن بشكل صحيح','error');if(!Number.isInteger(reps)||reps<1)return setStatus('اكتب عدد العدات بشكل صحيح','error');const b=$('save');b.disabled=true;setStatus('جاري الحفظ…');$('pr').textContent='';try{const r=await api('/api/workout/set',{day,idx,weight,reps});$('set').textContent=`الجولة ${r.next_set}`;$('weight').value='';$('reps').value='';renderRows(r.today_sets);setStatus(`تم حفظ الجولة ${r.saved_set}`,'success');if(r.pr_events?.length)$('pr').textContent=r.pr_events.join('\n');tg?.HapticFeedback?.notificationOccurred('success');setTimeout(()=>$('weight').focus(),120)}catch(e){setStatus(e.message,'error');tg?.HapticFeedback?.notificationOccurred('error')}finally{b.disabled=false}}
$('undo').onclick=async()=>{try{const r=await api('/api/workout/undo',{day,idx});$('set').textContent=`الجولة ${r.next_set}`;renderRows(r.today_sets);setStatus(r.message,'success')}catch(e){setStatus(e.message,'error')}};
$('finish').onclick=async()=>{try{const r=await api('/api/workout/finish',{day,idx});setStatus(r.message,'success');tg?.HapticFeedback?.notificationOccurred('success');setTimeout(()=>tg?.close(),650)}catch(e){setStatus(e.message,'error')}};
$('cancelEdit').onclick=closeEdit;$('modal').onclick=e=>{if(e.target===$('modal'))closeEdit()};
$('saveEdit').onclick=async()=>{const weight=parseFloat($('editWeight').value),reps=parseInt($('editReps').value,10);if(!Number.isFinite(weight)||weight<0||!Number.isInteger(reps)||reps<1)return;const b=$('saveEdit');b.disabled=true;try{const r=await api('/api/workout/edit',{day,idx,set_number:editingSet,weight,reps});renderRows(r.today_sets);closeEdit();setStatus(`تم تعديل الجولة ${r.updated_set}`,'success');tg?.HapticFeedback?.notificationOccurred('success')}catch(e){setStatus(e.message,'error')}finally{b.disabled=false}};
load();
</script></body></html>
