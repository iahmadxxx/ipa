name: Build FitbitAir IPA

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_VERSION: "2.2.6"
  BUILD_NUMBER: "2209"
  IPA_FILE: "FitbitAir-2.2.6-Build-2209-Unsigned.ipa"

jobs:
  build-unsigned-ipa:
    name: Build verified unsigned IPA for GBox
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Verify iOS source layout
        run: |
          set -euo pipefail

          ROOT="FitbitAir-iOS"
          SOURCE="$ROOT/FitbitAir"
          PROJECT="$ROOT/FitbitAir.xcodeproj/project.pbxproj"

          test -f "$PROJECT"
          test -f "$SOURCE/FitbitAirApp.swift"
          test -f "$SOURCE/APIClient.swift"
          test -f "$SOURCE/Models.swift"
          test -f "$SOURCE/WorkoutView.swift"
          test -f "$SOURCE/WellnessView.swift"
          test -f "$SOURCE/ActivityTracking.swift"
          test -f "$SOURCE/Config.swift"
          test -f "$SOURCE/Info.plist"

          grep -q "ActivityTracking.swift in Sources" "$PROJECT"
          grep -q "@Published private(set) var activeSeconds" "$SOURCE/ActivityTracking.swift"
          grep -q "private var restEndsAt: Date?" "$SOURCE/WorkoutView.swift"
          grep -q "حذف نهائيًا" "$SOURCE/WellnessView.swift"
          grep -q "حذف من الجدول" "$SOURCE/WorkoutView.swift"

          DELETE_FUNC_COUNT=$(grep -c "private func deleteSession(_ session: ActivitySessionRecord)" "$SOURCE/ActivityTracking.swift")
          test "$DELETE_FUNC_COUNT" -eq 1

          while IFS= read -r -d '' file; do
            echo "Parsing $file"
            xcrun swiftc -frontend -parse "$file"
          done < <(find "$SOURCE" -name "*.swift" -print0)

          plutil -lint "$SOURCE/Info.plist"
          echo "Commit: $GITHUB_SHA"
          shasum -a 256 "$SOURCE/FitbitAirApp.swift" "$SOURCE/WorkoutView.swift" "$SOURCE/ActivityTracking.swift"
          echo "✅ iOS source verification passed"

      - name: Build iPhone app without signing
        run: |
          set -euo pipefail

          PROJECT="FitbitAir-iOS/FitbitAir.xcodeproj"
          BUILD_DIR="$RUNNER_TEMP/FitbitAirBuild"
          rm -rf "$BUILD_DIR"

          xcodebuild \
            -project "$PROJECT" \
            -target "FitbitAir" \
            -configuration Release \
            -sdk iphoneos \
            CONFIGURATION_BUILD_DIR="$BUILD_DIR" \
            MARKETING_VERSION="$APP_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

          APP_PATH="$BUILD_DIR/FitbitAir.app"
          test -d "$APP_PATH"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Set app identity and icon
        run: |
          set -euo pipefail

          PLIST="$APP_PATH/Info.plist"
          PLISTBUDDY="/usr/libexec/PlistBuddy"
          ICON_2X="FitbitAir-iOS/FitbitAir/Assets.xcassets/AppIcon.appiconset/AppIcon-120.png"
          ICON_3X="FitbitAir-iOS/FitbitAir/Assets.xcassets/AppIcon.appiconset/AppIcon-180.png"

          test -f "$PLIST"
          test -f "$ICON_2X"
          test -f "$ICON_3X"

          set_value() {
            local key="$1"
            local type="$2"
            local value="$3"
            "$PLISTBUDDY" -c "Set :$key $value" "$PLIST" 2>/dev/null || \
            "$PLISTBUDDY" -c "Add :$key $type $value" "$PLIST"
          }

          set_value "CFBundleDisplayName" string "FitbitAir $APP_VERSION"
          set_value "CFBundleName" string "FitbitAir"
          set_value "CFBundleIdentifier" string "com.ahmed.fitbitair"
          set_value "CFBundleShortVersionString" string "$APP_VERSION"
          set_value "CFBundleVersion" string "$BUILD_NUMBER"
          set_value "CFBundleExecutable" string "FitbitAir"
          set_value "CFBundlePackageType" string "APPL"

          cp "$ICON_2X" "$APP_PATH/AppIcon60x60@2x.png"
          cp "$ICON_3X" "$APP_PATH/AppIcon60x60@3x.png"

          "$PLISTBUDDY" -c "Delete :CFBundleIconFiles" "$PLIST" 2>/dev/null || true
          "$PLISTBUDDY" -c "Add :CFBundleIconFiles array" "$PLIST"
          "$PLISTBUDDY" -c "Add :CFBundleIconFiles:0 string AppIcon60x60" "$PLIST"

          "$PLISTBUDDY" -c "Delete :CFBundleIcons" "$PLIST" 2>/dev/null || true
          "$PLISTBUDDY" -c "Add :CFBundleIcons dict" "$PLIST"
          "$PLISTBUDDY" -c "Add :CFBundleIcons:CFBundlePrimaryIcon dict" "$PLIST"
          "$PLISTBUDDY" -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles array" "$PLIST"
          "$PLISTBUDDY" -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0 string AppIcon60x60" "$PLIST"
          "$PLISTBUDDY" -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconName string AppIcon" "$PLIST"

          plutil -lint "$PLIST"

      - name: Package IPA
        run: |
          set -euo pipefail

          PLIST="$APP_PATH/Info.plist"
          PLISTBUDDY="/usr/libexec/PlistBuddy"

          test "$("$PLISTBUDDY" -c 'Print :CFBundleDisplayName' "$PLIST")" = "FitbitAir $APP_VERSION"
          test "$("$PLISTBUDDY" -c 'Print :CFBundleIdentifier' "$PLIST")" = "com.ahmed.fitbitair"
          test "$("$PLISTBUDDY" -c 'Print :CFBundleShortVersionString' "$PLIST")" = "$APP_VERSION"
          test "$("$PLISTBUDDY" -c 'Print :CFBundleVersion' "$PLIST")" = "$BUILD_NUMBER"
          test -f "$APP_PATH/AppIcon60x60@2x.png"
          test -f "$APP_PATH/AppIcon60x60@3x.png"

          PACKAGE_DIR="$RUNNER_TEMP/ipa"
          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR/Payload"

          {
            echo "version=$APP_VERSION"
            echo "build=$BUILD_NUMBER"
            echo "commit=$GITHUB_SHA"
            echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "$APP_PATH/FitbitAir-Build-Manifest.txt"

          cp -R "$APP_PATH" "$PACKAGE_DIR/Payload/FitbitAir.app"
          cd "$PACKAGE_DIR"
          /usr/bin/zip -qry "$GITHUB_WORKSPACE/$IPA_FILE" Payload

      - name: Verify final IPA
        run: |
          set -euo pipefail

          VERIFY_DIR="$RUNNER_TEMP/verify-ipa"
          rm -rf "$VERIFY_DIR"
          mkdir -p "$VERIFY_DIR"
          unzip -q "$IPA_FILE" -d "$VERIFY_DIR"

          FINAL_APP="$VERIFY_DIR/Payload/FitbitAir.app"
          FINAL_PLIST="$FINAL_APP/Info.plist"
          PLISTBUDDY="/usr/libexec/PlistBuddy"

          test -d "$FINAL_APP"
          test -f "$FINAL_APP/FitbitAir-Build-Manifest.txt"
          test -f "$FINAL_APP/AppIcon60x60@2x.png"
          test -f "$FINAL_APP/AppIcon60x60@3x.png"
          test "$("$PLISTBUDDY" -c 'Print :CFBundleDisplayName' "$FINAL_PLIST")" = "FitbitAir $APP_VERSION"
          test "$("$PLISTBUDDY" -c 'Print :CFBundleIdentifier' "$FINAL_PLIST")" = "com.ahmed.fitbitair"
          test "$("$PLISTBUDDY" -c 'Print :CFBundleShortVersionString' "$FINAL_PLIST")" = "$APP_VERSION"
          test "$("$PLISTBUDDY" -c 'Print :CFBundleVersion' "$FINAL_PLIST")" = "$BUILD_NUMBER"

          echo "✅ FINAL IPA VERIFIED"

      - name: Upload verified IPA
        uses: actions/upload-artifact@v4
        with:
          name: FitbitAir-2.2.6-Build-2209-VERIFIED
          path: FitbitAir-2.2.6-Build-2209-Unsigned.ipa
          if-no-files-found: error
          retention-days: 30
