name: Build FitbitAir IPA

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-unsigned-ipa:
    name: Build verified unsigned IPA for GBox
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Preflight source files
        run: |
          set -euo pipefail
          test -f "FitbitAir-iOS/FitbitAir/APIClient.swift"
          test -f "FitbitAir-iOS/FitbitAir/Models.swift"
          test -f "FitbitAir-iOS/FitbitAir/MoreView.swift"
          test -f "FitbitAir-iOS/FitbitAir/WellnessView.swift"
          test -f "FitbitAir-iOS/FitbitAir/ActivityTracking.swift"
          grep -q "struct NutritionDayResponse" "FitbitAir-iOS/FitbitAir/Models.swift"
          grep -q "struct ConnectionStatusResponse" "FitbitAir-iOS/FitbitAir/APIClient.swift"
          grep -q "struct HealthDayResponse" "FitbitAir-iOS/FitbitAir/APIClient.swift"
          grep -q "struct ActivityHubView" "FitbitAir-iOS/FitbitAir/ActivityTracking.swift"
          grep -q "case home, workout, nutrition, coach, insights, more" "FitbitAir-iOS/FitbitAir/FitbitAirApp.swift"
          grep -q "case .activities" "FitbitAir-iOS/FitbitAir/WorkoutView.swift"
          grep -q "اضغط لعرض التمارين" "FitbitAir-iOS/FitbitAir/WorkoutView.swift"
          grep -q "حذف نهائيًا" "FitbitAir-iOS/FitbitAir/WellnessView.swift"
          grep -q "MuscleAnatomyMapView" "FitbitAir-iOS/FitbitAir/ExerciseLibrary.swift"
          grep -q "حذف من الجدول" "FitbitAir-iOS/FitbitAir/WorkoutView.swift"
          grep -q "activities/session/delete" "FitbitAir-iOS/FitbitAir/ActivityTracking.swift"
          grep -q "def delete_session" "Railway-Server/activity_tracker.py"
          grep -q "Version 2.2.4" "FITBITAIR-2.2.4-CONTROL-ANATOMY-FIX.md"
          grep -q "نسخة 2.2.4 تحكم كامل وحركة احترافية" "FitbitAir-iOS/FitbitAir/FitbitAirApp.swift"
          echo "Commit: $GITHUB_SHA"
          shasum -a 256 FitbitAir-iOS/FitbitAir/FitbitAirApp.swift FitbitAir-iOS/FitbitAir/WorkoutView.swift FitbitAir-iOS/FitbitAir/ActivityTracking.swift
          grep -q "ActivityTracking.swift in Sources" "FitbitAir-iOS/FitbitAir.xcodeproj/project.pbxproj"
          plutil -lint "FitbitAir-iOS/FitbitAir/Info.plist"
          echo "✅ Core, wellness, exercise library, and activity tracking sources are present"

      - name: Build iPhone app without signing
        run: |
          set -euo pipefail

          PROJECT="FitbitAir-iOS/FitbitAir.xcodeproj"
          BUILD_DIR="$RUNNER_TEMP/FitbitAirBuild"

          rm -rf "$BUILD_DIR"

          xcodebuild \
            -project "$PROJECT" \
            -target "FitbitAir" \
            -configuration Release \
            -sdk iphoneos \
            CONFIGURATION_BUILD_DIR="$BUILD_DIR" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

          APP_PATH="$BUILD_DIR/FitbitAir.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: FitbitAir.app was not found"
            find "$BUILD_DIR" -maxdepth 4 -name "*.app" -print || true
            exit 1
          fi

          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Force app identity and icon into built app
        run: |
          set -euo pipefail

          PLIST="$APP_PATH/Info.plist"
          PLISTBUDDY="/usr/libexec/PlistBuddy"
          ICON_SOURCE_2X="FitbitAir-iOS/FitbitAir/Assets.xcassets/AppIcon.appiconset/AppIcon-120.png"
          ICON_SOURCE_3X="FitbitAir-iOS/FitbitAir/Assets.xcassets/AppIcon.appiconset/AppIcon-180.png"

          test -f "$PLIST"
          test -f "$ICON_SOURCE_2X"
          test -f "$ICON_SOURCE_3X"

          set_plist_value() {
            local key="$1"
            local type="$2"
            local value="$3"
            "$PLISTBUDDY" -c "Set :$key $value" "$PLIST" 2>/dev/null || \
            "$PLISTBUDDY" -c "Add :$key $type $value" "$PLIST"
          }

          set_plist_value "CFBundleDisplayName" string "FitbitAir 2.2.4"
          set_plist_value "CFBundleName" string "FitbitAir"
          set_plist_value "CFBundleIdentifier" string "com.ahmed.fitbitair"
          set_plist_value "CFBundleShortVersionString" string "2.2.4"
          set_plist_value "CFBundleVersion" string "2205"
          set_plist_value "CFBundleExecutable" string "FitbitAir"
          set_plist_value "CFBundlePackageType" string "APPL"

          # Add physical icon files directly to the .app so GBox can read them.
          cp "$ICON_SOURCE_2X" "$APP_PATH/AppIcon60x60@2x.png"
          cp "$ICON_SOURCE_3X" "$APP_PATH/AppIcon60x60@3x.png"

          # Recreate icon metadata explicitly.
          "$PLISTBUDDY" -c "Delete :CFBundleIconFiles" "$PLIST" 2>/dev/null || true
          "$PLISTBUDDY" -c "Add :CFBundleIconFiles array" "$PLIST"
          "$PLISTBUDDY" -c "Add :CFBundleIconFiles:0 string AppIcon60x60" "$PLIST"

          "$PLISTBUDDY" -c "Delete :CFBundleIcons" "$PLIST" 2>/dev/null || true
          "$PLISTBUDDY" -c "Add :CFBundleIcons dict" "$PLIST"
          "$PLISTBUDDY" -c "Add :CFBundleIcons:CFBundlePrimaryIcon dict" "$PLIST"
          "$PLISTBUDDY" -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles array" "$PLIST"
          "$PLISTBUDDY" -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0 string AppIcon60x60" "$PLIST"
          "$PLISTBUDDY" -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconName string AppIcon" "$PLIST"

          plutil -lint "$PLIST"

          echo "Built app identity:"
          "$PLISTBUDDY" -c "Print :CFBundleDisplayName" "$PLIST"
          "$PLISTBUDDY" -c "Print :CFBundleIdentifier" "$PLIST"
          "$PLISTBUDDY" -c "Print :CFBundleShortVersionString" "$PLIST"
          "$PLISTBUDDY" -c "Print :CFBundleVersion" "$PLIST"

      - name: Verify built app before packaging
        run: |
          set -euo pipefail

          PLIST="$APP_PATH/Info.plist"
          PLISTBUDDY="/usr/libexec/PlistBuddy"

          NAME="$("$PLISTBUDDY" -c "Print :CFBundleDisplayName" "$PLIST")"
          BUNDLE_ID="$("$PLISTBUDDY" -c "Print :CFBundleIdentifier" "$PLIST")"
          VERSION="$("$PLISTBUDDY" -c "Print :CFBundleShortVersionString" "$PLIST")"
          BUILD="$("$PLISTBUDDY" -c "Print :CFBundleVersion" "$PLIST")"

          test "$NAME" = "FitbitAir 2.2.4"
          test "$BUNDLE_ID" = "com.ahmed.fitbitair"
          test "$VERSION" = "2.2.4"
          test "$BUILD" = "2205"
          test -f "$APP_PATH/AppIcon60x60@2x.png"
          test -f "$APP_PATH/AppIcon60x60@3x.png"

          echo "✅ App metadata and icon verified before packaging"

      - name: Package IPA
        run: |
          set -euo pipefail

          rm -rf "$RUNNER_TEMP/ipa"
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          {
            echo "version=2.2.4"
            echo "build=2205"
            echo "commit=$GITHUB_SHA"
            echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "$APP_PATH/FitbitAir-Build-Manifest.txt"
          cp -R "$APP_PATH" "$RUNNER_TEMP/ipa/Payload/FitbitAir.app"

          cd "$RUNNER_TEMP/ipa"
          /usr/bin/zip -qry "$GITHUB_WORKSPACE/FitbitAir-2.2.4-Build-2205-Unsigned.ipa" Payload

      - name: Verify final IPA contents
        run: |
          set -euo pipefail

          VERIFY_DIR="$RUNNER_TEMP/verify-ipa"
          rm -rf "$VERIFY_DIR"
          mkdir -p "$VERIFY_DIR"

          unzip -q "FitbitAir-2.2.4-Build-2205-Unsigned.ipa" -d "$VERIFY_DIR"

          FINAL_APP="$VERIFY_DIR/Payload/FitbitAir.app"
          FINAL_PLIST="$FINAL_APP/Info.plist"
          PLISTBUDDY="/usr/libexec/PlistBuddy"

          test -d "$FINAL_APP"
          test -f "$FINAL_PLIST"
          test -f "$FINAL_APP/AppIcon60x60@2x.png"
          test -f "$FINAL_APP/AppIcon60x60@3x.png"

          NAME="$("$PLISTBUDDY" -c "Print :CFBundleDisplayName" "$FINAL_PLIST")"
          BUNDLE_ID="$("$PLISTBUDDY" -c "Print :CFBundleIdentifier" "$FINAL_PLIST")"
          VERSION="$("$PLISTBUDDY" -c "Print :CFBundleShortVersionString" "$FINAL_PLIST")"
          BUILD="$("$PLISTBUDDY" -c "Print :CFBundleVersion" "$FINAL_PLIST")"

          echo "Final IPA metadata:"
          echo "Name: $NAME"
          echo "Bundle ID: $BUNDLE_ID"
          echo "Version: $VERSION"
          echo "Build: $BUILD"

          test "$NAME" = "FitbitAir 2.2.4"
          test "$BUNDLE_ID" = "com.ahmed.fitbitair"
          test "$VERSION" = "2.2.4"
          test "$BUILD" = "2205"

          echo "✅ FINAL IPA VERIFIED — safe to upload as artifact"

      - name: Upload verified IPA
        uses: actions/upload-artifact@v4
        with:
          name: FitbitAir-2.2.4-Build-2205-VERIFIED
          path: FitbitAir-2.2.4-Build-2205-Unsigned.ipa
          if-no-files-found: error
          retention-days: 30
